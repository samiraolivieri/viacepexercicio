<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de CEP</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="main-container">
        <h2>Digite o cep desejado</h2>
        
        <input type="text" id="cepInput" placeholder="Ex: 79003241" maxlength="8">
        
        <div class="button-group">
            <button id="btnBuscar" class="btn-buscar">Buscar</button>
            <button id="btnLimpar" class="btn-limpar">Limpar</button>
        </div>

        <div id="resultado" class="resultado-container">
            </div>
    </div>

    <script src="script.js"></script> </body>
</html>
